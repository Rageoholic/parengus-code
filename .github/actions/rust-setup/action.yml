name: Rust Setup
description: >-
  Install Rust stable, restore Swatinem cache, and install
  system dependencies (cmake, wayland, xkbcommon).

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Install system dependencies
      shell: bash
      run: >-
        sudo apt-get update && sudo apt-get install -y
        cmake libwayland-dev libxkbcommon-dev pkg-config
